[package]
name = "curium"
version = "0.6.0"
description = "Modern QR Code customizer and generator"
authors = ["Curium"]
edition = "2021"

[lib]
name = "curium_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
time = ">=0.3.36, <0.3.52"
