name: Desktop Release

on:
  push:
    tags:
      - "v*"
    branches:
      - preview
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - windows
          - linux

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (.dmg) ───────────────────────────────────────────────────
          - platform: macos-14
            args: "--target aarch64-apple-darwin --bundles dmg"
            artifact_suffix: macos-arm64
            target: aarch64-apple-darwin
          - platform: macos-14
            args: "--target x86_64-apple-darwin --bundles dmg"
            artifact_suffix: macos-x64
            target: x86_64-apple-darwin

          # ── Windows (.exe via NSIS) ────────────────────────────────────────
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact_suffix: windows-x64
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc --bundles nsis"
            artifact_suffix: windows-arm64
            target: aarch64-pc-windows-msvc

          # ── Linux (.AppImage) ──────────────────────────────────────────────
          - platform: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu --bundles appimage"
            artifact_suffix: linux-x64
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            args: "--target aarch64-unknown-linux-gnu --bundles appimage"
            artifact_suffix: linux-arm64
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable && corepack prepare pnpm@11.8.0 --activate

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target
          shared-key: ${{ matrix.artifact_suffix }}

      - name: Install Linux dependencies (x64)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Linux dependencies (arm64)
        if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Do not create a release — Android workflow handles that
          releaseId: ""
          projectPath: packages/desktop
          tauriScript: corepack pnpm exec tauri
          args: ${{ matrix.args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.artifact_suffix }}
          path: |
            packages/desktop/src-tauri/target/*/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/*/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/*/release/bundle/**/*.AppImage
          if-no-files-found: warn
          retention-days: 14

  upload-to-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: true

      - name: Upload to existing release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"

          # Check if release exists (created by Android workflow)
          if ! gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG not found — creating it now"
            gh release create "$TAG" \
              --title "Curium $TAG" \
              --generate-notes \
              --draft=true
          fi

          # Upload all desktop artifacts to the release
          shopt -s nullglob
          FILES=(
            desktop-artifacts/**/*.dmg
            desktop-artifacts/**/*.exe
            desktop-artifacts/**/*.AppImage
            desktop-artifacts/**/*.nsis.zip
            desktop-artifacts/**/*.nsis.zip.sig
          )

          if [ ${#FILES[@]} -gt 0 ]; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
            echo "Uploaded ${#FILES[@]} desktop artifacts to $TAG"
          else
            echo "No desktop artifacts found to upload"
          fi
