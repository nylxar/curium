name: Android Test Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "master"
        type: choice
        options:
          - master
          - preview
          - nightly
      flavor:
        description: "Build variant"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - preview
          - nightly

permissions:
  contents: read

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing, flavors, and ABI filter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          if not path.exists():
              raise SystemExit("build.gradle not generated by expo prebuild")

          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)

          def indent_of(line):
              return len(line) - len(line.lstrip())

          def read_block(lines, idx):
              depth = lines[idx].count('{') - lines[idx].count('}')
              block = [lines[idx]]
              i = idx + 1
              while i < len(lines) and depth > 0:
                  depth += lines[i].count('{') - lines[i].count('}')
                  block.append(lines[i])
                  i += 1
              return block, i

          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              stripped = line.strip()

              if stripped == "signingConfigs {":
                  block, i = read_block(lines, i)
                  if "release {" not in "".join(block):
                      ind = indent_of(block[0])
                      block.insert(-1, f"{' '*(ind+4)}release {{\n")
                      block.insert(-1, f"{' '*(ind+8)}storeFile file(\"release.keystore\")\n")
                      block.insert(-1, f"{' '*(ind+8)}storePassword System.getenv(\"ANDROID_KEYSTORE_PASSWORD\")\n")
                      block.insert(-1, f"{' '*(ind+8)}keyAlias System.getenv(\"ANDROID_KEY_ALIAS\")\n")
                      block.insert(-1, f"{' '*(ind+8)}keyPassword System.getenv(\"ANDROID_KEY_PASSWORD\")\n")
                      block.insert(-1, f"{' '*(ind+4)}}}\n")
                  out.extend(block)

              elif stripped == "android {":
                  if "archivesName" not in "".join(lines):
                      out.append("base {\n    archivesName = \"curium\"\n}\n\n")
                  out.append(line)
                  i += 1
                  ind = indent_of(line)
                  if "flavorDimensions" not in "".join(lines):
                      out.append(f"{' '*(ind+4)}flavorDimensions \"default\"\n")
                  if "productFlavors {" not in "".join(lines):
                      flavors = (
                          f"{' '*(ind+4)}productFlavors {{\n"
                          f"{' '*(ind+8)}stable {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".stable\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-stable\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+8)}preview {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".preview\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-preview\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+8)}nightly {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".nightly\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-nightly\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+4)}}}\n"
                      )
                      out.append(flavors)

              elif stripped == "release {":
                  block, i = read_block(lines, i)
                  if "signingConfig signingConfigs.release" not in "".join(block):
                      ind = indent_of(block[0])
                      block.insert(-1, f"{' '*(ind+4)}signingConfig signingConfigs.release\n")
                  out.extend(block)

              elif stripped == "react {":
                  block, i = read_block(lines, i)
                  if "debuggableVariants" not in "".join(block):
                      ind = indent_of(block[0])
                      block.insert(-1, f"{' '*(ind+4)}debuggableVariants = [\"stableDebug\", \"previewDebug\", \"nightlyDebug\"]\n")
                  out.extend(block)

              else:
                  out.append(line)
                  i += 1

          path.write_text("".join(out), encoding="utf-8")
          print("build.gradle patched (flavors only, no splits)")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build arm64-v8a APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FLAVOR: ${{ inputs.flavor }}
        working-directory: android
        run: ./gradlew ":app:assemble${FLAVOR^}Release" -PreactNativeArchitectures=arm64-v8a --build-cache --parallel

      - name: Rename APK with arch suffix
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ inputs.flavor }}/release"
          for f in "$APK_DIR"/*.apk; do
            mv "$f" "${f%.apk}-arm64-v8a.apk"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: curium-test-${{ inputs.flavor }}-${{ inputs.branch }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ inputs.flavor }}/release/*.apk
          if-no-files-found: error
          retention-days: 3
