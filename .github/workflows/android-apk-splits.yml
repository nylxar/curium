# Updated: May 28, 2026
name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Force all actions to use Node 24 runtime (Node 20 deprecated Jun 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-apk-splits:
    name: Build signed density + ABI split APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Java (NO gradle cache here — android/ doesn't exist yet) ─────────
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── JS deps ───────────────────────────────────────────────────────────
      - name: Install JS dependencies
        run: npm ci

      # ── Expo prebuild — generates android/ with gradle files ──────────────
      - name: Generate Android project via Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install --non-interactive

      # ── Gradle cache (AFTER prebuild so gradle-wrapper.properties exists) ─
      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Speed: inject Gradle performance flags ────────────────────────────
      - name: Tune Gradle performance
        shell: bash
        run: |
          mkdir -p android
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          EOF

      # ── Make gradlew executable ───────────────────────────────────────────
      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # ── Signing: decode keystore ──────────────────────────────────────────
      - name: Decode release keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── Inject signing + splits into build.gradle ─────────────────────────
      - name: Inject signing + splits into build.gradle
        shell: pwsh
        run: |
          $path = "android/app/build.gradle"

          if (!(Test-Path $path)) {
            throw "Expected Gradle file not found at: $path"
          }

          $gradle = Get-Content $path -Raw

          if ($gradle -notmatch 'android\s*\{') {
            throw "Could not locate android block in $path"
          }

          # Inject signingConfigs block
          if ($gradle -notmatch 'signingConfigs\s*\{') {
            $signingBlock = @"

            signingConfigs {
                release {
                    storeFile file("release.keystore")
                    storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                    keyAlias System.getenv("ANDROID_KEY_ALIAS")
                    keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                }
            }

          "@
            $gradle = $gradle -replace '(android\s*\{)', "`$1$signingBlock"
          }

          # Inject splits block
          if ($gradle -notmatch 'splits\s*\{') {
            $splitsBlock = @"

            splits {
                density {
                    enable true
                    reset()
                    include "mdpi", "hdpi", "xhdpi", "xxhdpi", "xxxhdpi"
                    compatibleScreens "small", "normal", "large", "xlarge"
                }
                abi {
                    enable true
                    reset()
                    include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                    universalApk true
                }
            }

          "@
            $gradle = $gradle -replace '(android\s*\{)', "`$1$splitsBlock"
          }

          # Wire signingConfig into release buildType
          if ($gradle -match 'buildTypes') {
            $gradle = $gradle -replace '(?s)(buildTypes\s*\{.*?release\s*\{)', "`$1`n                signingConfig signingConfigs.release"
          }

          Set-Content $path $gradle -Encoding UTF8
          Write-Host "build.gradle patched successfully."

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            --build-cache \
            --parallel \
            --stacktrace \
            --no-daemon

      # ── Collect APKs ──────────────────────────────────────────────────────
      - name: Collect APK artifacts
        shell: bash
        run: |
          mkdir -p artifacts/apk-splits
          find android/app/build/outputs/apk/release -name "*.apk" \
            -print -exec cp {} artifacts/apk-splits/ \;
          echo "--- APKs collected ---"
          ls -lh artifacts/apk-splits/

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: artifacts/apk-splits/*.apk
          if-no-files-found: error
          retention-days: 14
