name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing and ABI splits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("android/app/build.gradle")
          if not path.exists():
              raise SystemExit("android/app/build.gradle was not generated by expo prebuild")

          text = path.read_text(encoding="utf-8")

          if "signingConfigs" not in text:
              signing_block = '''
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              '''
              text = re.sub(r'(android\s*\{\s*\n)', r'\1' + signing_block + '\n', text, count=1)

          if "splits {" not in text:
              splits_block = '''
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86_64"
                      universalApk true
                  }
              }
              '''
              text = re.sub(r'(android\s*\{\s*\n)', r'\1' + splits_block + '\n', text, count=1)

          if "signingConfig signingConfigs.release" not in text:
              text = re.sub(
                  r'(^\s*release\s*\{\s*$)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )

          path.write_text(text, encoding="utf-8")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          tmp_release="$(mktemp)"
          http_code="$(curl -sS -o "$tmp_release" -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${GH_TAG}" || true)"

          if [ "$http_code" = "404" ]; then
            body="$(python3 - <<'PY'
            import json, os
            print(json.dumps({
                "tag_name": os.environ["GH_TAG"],
                "target_commitish": os.environ["GH_SHA"],
                "name": os.environ["GH_TAG"],
                "draft": False,
                "prerelease": False,
                "generate_release_notes": True,
            }))
            PY
            )"
            curl -sS -o "$tmp_release" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d "$body" \
              "https://api.github.com/repos/${GH_REPO}/releases"
          elif [ "$http_code" != "200" ]; then
            cat "$tmp_release"
            exit 1
          fi

          upload_url="$(python3 - <<'PY' "$tmp_release"
          import json, sys
          print(json.load(open(sys.argv[1]))["upload_url"].split("{", 1)[0])
          PY
          )"

          shopt -s globstar nullglob
          files=(android/app/build/outputs/apk/**/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No APKs found"
            exit 1
          fi

          for file in "${files[@]}"; do
            name="$(basename "$file")"
            encoded_name="$(python3 - <<'PY' "$name"
            import sys, urllib.parse
            print(urllib.parse.quote(sys.argv[1]))
            PY
            )"
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${upload_url}?name=${encoded_name}"
          done
