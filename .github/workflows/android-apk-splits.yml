name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing and ABI splits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("android/app/build.gradle")
          if not path.exists():
              raise SystemExit("android/app/build.gradle was not generated by expo prebuild")

          text = path.read_text(encoding="utf-8")

          if "signingConfigs" not in text:
              signing_block = '''
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              '''
              text = re.sub(r'(android\s*\{\s*\n)', r'\1' + signing_block + '\n', text, count=1)

          if "splits {" not in text:
              splits_block = '''
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86_64"
                      universalApk true
                  }
              }
              '''
              text = re.sub(r'(android\s*\{\s*\n)', r'\1' + splits_block + '\n', text, count=1)

          if "signingConfig signingConfigs.release" not in text:
              lines = text.splitlines(keepends=True)
              new_lines = []
              i = 0
              while i < len(lines):
                  stripped = lines[i].strip()
                  if stripped.startswith("release") and stripped.endswith("{"):
                      new_lines.append(lines[i])
                      depth = 1
                      i += 1
                      release_lines = []
                      while i < len(lines) and depth > 0:
                          line_stripped = lines[i].strip()
                          depth += line_stripped.count("{") - line_stripped.count("}")
                          release_lines.append(lines[i])
                          i += 1
                      indent = " " * (len(lines[i - 1]) - len(lines[i - 1].lstrip()))
                      release_lines.insert(-1, f"{indent}signingConfig signingConfigs.release\n")
                      new_lines.extend(release_lines)
                  else:
                      new_lines.append(lines[i])
                      i += 1
              text = "".join(new_lines)

          path.write_text(text, encoding="utf-8")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            --prerelease=false \
            android/app/build/outputs/apk/**/*.apk
