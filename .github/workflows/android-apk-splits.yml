name: Android APK Splits

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
            | base64 --decode \
            > android/app/release.keystore

      - name: Configure Gradle properties
        run: |
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF

      # Only keep this step if Curium does NOT already define
      # signingConfigs and splits in source control.
      - name: Inject signing and APK splits
        run: |
          python3 .github/scripts/configure_android_build.py

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew \
            :app:assembleRelease \
            --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curium-apk-splits-${{ github.ref_name }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
