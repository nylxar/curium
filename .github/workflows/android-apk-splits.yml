name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Pillow for icon generation
        run: pip install Pillow

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing, flavors, and ABI splits
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("android/app/build.gradle")
          if not path.exists():
              raise SystemExit("android/app/build.gradle was not generated by expo prebuild")

          today = datetime.now(timezone.utc).strftime("%Y%m%d")
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)

          def indent_of(line):
              return len(line) - len(line.lstrip())

          def read_block(lines, idx):
              """Read a {...} block starting at the line containing '{'. Returns (block_lines, next_idx)."""
              depth = lines[idx].count('{') - lines[idx].count('}')
              block = [lines[idx]]
              i = idx + 1
              while i < len(lines) and depth > 0:
                  depth += lines[i].count('{') - lines[i].count('}')
                  block.append(lines[i])
                  i += 1
              return block, i

          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              stripped = line.strip()

              # --- signingConfigs: add release config if missing ---
              if stripped == "signingConfigs {":
                  block, i = read_block(lines, i)
                  if "release {" not in "".join(block):
                      ind = indent_of(block[0])
                      block.insert(-1, f"{' '*(ind+4)}release {{\n")
                      block.insert(-1, f"{' '*(ind+8)}storeFile file(\"release.keystore\")\n")
                      block.insert(-1, f"{' '*(ind+8)}storePassword System.getenv(\"ANDROID_KEYSTORE_PASSWORD\")\n")
                      block.insert(-1, f"{' '*(ind+8)}keyAlias System.getenv(\"ANDROID_KEY_ALIAS\")\n")
                      block.insert(-1, f"{' '*(ind+8)}keyPassword System.getenv(\"ANDROID_KEY_PASSWORD\")\n")
                      block.insert(-1, f"{' '*(ind+4)}}}\n")
                  out.extend(block)

              # --- defaultConfig: add product flavors if missing ---
              elif stripped == "defaultConfig {":
                  block, i = read_block(lines, i)
                  if "productFlavors {" not in "".join(block):
                      ind = indent_of(block[0])
                      flavors = (
                          f"{' '*(ind+4)}productFlavors {{\n"
                          f"{' '*(ind+8)}stable {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".stable\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-stable\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+8)}preview {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".preview\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-preview\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+8)}nightly {{\n"
                          f"{' '*(ind+12)}dimension \"default\"\n"
                          f"{' '*(ind+12)}applicationIdSuffix \".nightly\"\n"
                          f"{' '*(ind+12)}versionNameSuffix \"-nightly\"\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+4)}}}\n"
                      )
                      block.insert(-1, flavors)
                  out.extend(block)

              # --- android: add splits block if missing ---
              elif stripped == "android {":
                  out.append(line)
                  i += 1
                  if "splits {" not in "".join(lines):
                      ind = indent_of(line)
                      splits = (
                          f"{' '*(ind+4)}splits {{\n"
                          f"{' '*(ind+8)}abi {{\n"
                          f"{' '*(ind+12)}enable true\n"
                          f"{' '*(ind+12)}reset()\n"
                          f"{' '*(ind+12)}include \"armeabi-v7a\", \"arm64-v8a\", \"x86_64\"\n"
                          f"{' '*(ind+12)}universalApk true\n"
                          f"{' '*(ind+8)}}}\n"
                          f"{' '*(ind+4)}}}\n"
                      )
                      out.append(splits)
                  depth = 1
                  while i < len(lines) and depth > 0:
                      depth += lines[i].count('{') - lines[i].count('}')
                      out.append(lines[i])
                      i += 1

              # --- release buildType: add signingConfig if missing ---
              elif stripped == "release {":
                  block, i = read_block(lines, i)
                  if "signingConfig signingConfigs.release" not in "".join(block):
                      ind = indent_of(block[0])
                      block.insert(-1, f"{' '*(ind+4)}signingConfig signingConfigs.release\n")
                  out.extend(block)

              else:
                  out.append(line)
                  i += 1

          path.write_text("".join(out), encoding="utf-8")
          print("build.gradle patched successfully")

          # --- Generate variant icons ---
          icon_src = Path("assets/android-icon-foreground.png")
          if icon_src.exists():
              try:
                  from PIL import Image

                  variants = {
                      "stable":  (0, 128, 255),
                      "preview": (255, 153, 0),
                      "nightly": (255, 0, 0),
                  }
                  base = Image.open(icon_src).convert("RGBA")
                  for name, (cr, cg, cb) in variants.items():
                      mask = base.split()[3]
                      tinted = Image.new("RGBA", base.size, (cr, cg, cb, 255))
                      tinted.putalpha(mask)

                      for density, folder in [("mdpi", "mipmap-mdpi"), ("hdpi", "mipmap-hdpi"),
                                               ("xhdpi", "mipmap-xhdpi"), ("xxhdpi", "mipmap-xxhdpi"),
                                               ("xxxhdpi", "mipmap-xxxhdpi")]:
                          scale = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}[density]
                          out_dir = Path(f"android/app/src/{name}/res/{folder}")
                          out_dir.mkdir(parents=True, exist_ok=True)
                          resized = tinted.resize((scale, scale), Image.LANCZOS)
                          resized.save(out_dir / "ic_launcher.png")
                          resized.save(out_dir / "ic_launcher_round.png")
                  print("Variant icons generated")
              except ImportError:
                  print("WARNING: Pillow not available, skipping icon generation")
          else:
              print("WARNING: No foreground icon found, skipping icon generation")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build stable release APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew :app:assembleStableRelease --build-cache --parallel --stacktrace

      - name: Build preview release APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew :app:assemblePreviewRelease --build-cache --parallel --stacktrace

      - name: Build nightly release APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew :app:assembleNightlyRelease --build-cache --parallel --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: curium-apk-splits-${{ github.ref_name || github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --draft=false \
            --prerelease=false

          for flavor in stable preview nightly; do
            apk_dir="android/app/build/outputs/apk/${flavor}/release"
            if [ -d "$apk_dir" ]; then
              for apk in "$apk_dir"/*.apk; do
                gh release upload "$TAG" "$apk" --clobber
              done
            fi
          done
