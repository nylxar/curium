name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6        # Node 24 native
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6       # Node 24 native
        with:
          node-version: 24

      - uses: actions/setup-java@v5       # Node 24 native
        with:
          distribution: temurin
          java-version: 21

      # Manual pnpm store cache — avoids the broken store path resolution
      # that occurs when using cache: pnpm in setup-node with action-setup@v6
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      # MUST be before keystore/build.gradle changes — --clean wipes android/
      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # Force wrapper to Gradle 9.5.1 (latest stable) after prebuild regenerates it.
      # Run twice: first pass updates properties, second replaces the wrapper JAR.
      - name: Upgrade Gradle wrapper to 9.5.1
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=9.5.1 --distribution-type=bin
          ./gradlew wrapper --gradle-version=9.5.1 --distribution-type=bin

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      - name: Inject signing + splits into build.gradle
        run: |
          python3 - << 'PYEOF'
          import re, pathlib

          path = pathlib.Path("android/app/build.gradle")
          text = path.read_text(encoding="utf-8")

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """

          splits_block = """
              splits {
                  density {
                      enable true
                      reset()
                      include "mdpi", "hdpi", "xhdpi", "xxhdpi", "xxxhdpi"
                      compatibleScreens "small", "normal", "large", "xlarge"
                  }
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }
          """

          if "signingConfigs" not in text:
              text = re.sub(r'(android\s*\{)', r'\1' + signing_block, text, count=1)
              print("Injected signingConfigs")
          else:
              print("signingConfigs already present")

          if "splits" not in text:
              text = re.sub(r'(android\s*\{)', r'\1' + splits_block, text, count=1)
              print("Injected splits")
          else:
              print("splits already present")

          if "signingConfig signingConfigs.release" not in text:
              text = re.sub(
                  r'(buildTypes\s*\{[^}]*?release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text, count=1, flags=re.DOTALL
              )
              print("Wired signingConfig into buildTypes.release")
          else:
              print("signingConfig already wired")

          path.write_text(text, encoding="utf-8")
          PYEOF

      - uses: gradle/actions/setup-gradle@v6   # Node 24 native

      - name: Tune Gradle performance
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          EOF

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      - uses: actions/upload-artifact@v6       # Node 24 native
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
