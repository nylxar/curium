name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      # pnpm must be set up BEFORE setup-node so the pnpm store cache key resolves
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10          # v10 fixes "packages field missing or empty" (pnpm/pnpm#9361)
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # ── Java 21 ───────────────────────────────────────────────────────────────
      # Required by Gradle 9.x; Java 21 is the LTS EAS uses for SDK 56 / AGP 8.7+
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ── JS deps ──────────────────────────────────────────────────────────────
      # --ignore-workspace prevents "packages field missing or empty" when
      # pnpm-workspace.yaml exists with only onlyBuiltDependencies (no packages:)
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      # ── Expo prebuild ────────────────────────────────────────────────────────
      # MUST run BEFORE any android/ changes — --clean deletes & regenerates it
      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # ── Upgrade Gradle wrapper to 9.5.1 ──────────────────────────────────────
      # expo prebuild generates a wrapper pointing at an older Gradle that emits
      # "deprecated features incompatible with Gradle 10" warnings/errors.
      # We pin it to the latest stable (9.5.1) after prebuild so --clean can't
      # revert it. The wrapper is updated twice as required by the Gradle spec.
      - name: Upgrade Gradle wrapper to 9.5.1
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=9.5.1 --distribution-type=bin
          ./gradlew wrapper --gradle-version=9.5.1 --distribution-type=bin

      # ── Keystore (placed AFTER prebuild so --clean doesn't delete it) ────────
      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/release.keystore

      # ── Inject signingConfig + splits into build.gradle ──────────────────────
      # Python handles the generated Groovy file reliably across SDK template
      # versions; PowerShell regex is fragile when indentation/structure changes.
      - name: Inject signing + splits into build.gradle
        run: |
          python3 - << 'PYEOF'
          import re, pathlib

          path = pathlib.Path("android/app/build.gradle")
          text = path.read_text(encoding="utf-8")

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
          """

          splits_block = """
              splits {
                  density {
                      enable true
                      reset()
                      include "mdpi", "hdpi", "xhdpi", "xxhdpi", "xxxhdpi"
                      compatibleScreens "small", "normal", "large", "xlarge"
                  }
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }
          """

          if "signingConfigs" not in text:
              text = re.sub(r'(android\s*\{)', r'\1' + signing_block, text, count=1)
              print("Injected signingConfigs")
          else:
              print("signingConfigs already present")

          if "splits" not in text:
              text = re.sub(r'(android\s*\{)', r'\1' + splits_block, text, count=1)
              print("Injected splits")
          else:
              print("splits already present")

          if "signingConfig signingConfigs.release" not in text:
              text = re.sub(
                  r'(buildTypes\s*\{[^}]*?release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text, count=1, flags=re.DOTALL
              )
              print("Wired signingConfig into buildTypes.release")
          else:
              print("signingConfig already wired")

          path.write_text(text, encoding="utf-8")
          PYEOF

      # ── Gradle ───────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tune Gradle performance
        run: |
          cat >> android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          EOF

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      # ── Upload ────────────────────────────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
