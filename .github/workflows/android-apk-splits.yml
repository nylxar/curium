name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing and ABI splits
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          if not path.exists():
              raise SystemExit("android/app/build.gradle was not generated by expo prebuild")

          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)

          def indent_of(line):
              return len(line) - len(line.lstrip())

          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              stripped = line.strip()

              if stripped == "signingConfigs {" and "release {" not in stripped:
                  out.append(line)
                  sc_indent = indent_of(line)
                  i += 1
                  has_release = False
                  depth = 1
                  block = []
                  while i < len(lines) and depth > 0:
                      s = lines[i].strip()
                      depth += lines[i].count('{') - lines[i].count('}')
                      if s.startswith("release") and s.endswith("{"):
                          has_release = True
                      block.append(lines[i])
                      i += 1
                  if not has_release:
                      block.insert(-1, f"{' ' * (sc_indent + 4)}release {{\n")
                      block.insert(-1, f"{' ' * (sc_indent + 8)}storeFile file(\"release.keystore\")\n")
                      block.insert(-1, f"{' ' * (sc_indent + 8)}storePassword System.getenv(\"ANDROID_KEYSTORE_PASSWORD\")\n")
                      block.insert(-1, f"{' ' * (sc_indent + 8)}keyAlias System.getenv(\"ANDROID_KEY_ALIAS\")\n")
                      block.insert(-1, f"{' ' * (sc_indent + 8)}keyPassword System.getenv(\"ANDROID_KEY_PASSWORD\")\n")
                      block.insert(-1, f"{' ' * (sc_indent + 4)}}}\n")
                  out.extend(block)

              elif stripped == "release {" and "signingConfig signingConfigs.release" not in "".join(out):
                  out.append(line)
                  r_indent = indent_of(line)
                  i += 1
                  depth = 1
                  block = []
                  while i < len(lines) and depth > 0:
                      depth += lines[i].count('{') - lines[i].count('}')
                      block.append(lines[i])
                      i += 1
                  block.insert(-1, f"{' ' * (r_indent + 4)}signingConfig signingConfigs.release\n")
                  out.extend(block)

              elif stripped == "android {" and "splits {" not in "".join(lines):
                  out.append(line)
                  a_indent = indent_of(line)
                  i += 1
                  splits = f"{' ' * (a_indent + 4)}splits {{\n"
                  splits += f"{' ' * (a_indent + 8)}abi {{\n"
                  splits += f"{' ' * (a_indent + 12)}enable true\n"
                  splits += f"{' ' * (a_indent + 12)}reset()\n"
                  splits += f"{' ' * (a_indent + 12)}include \"armeabi-v7a\", \"arm64-v8a\", \"x86_64\"\n"
                  splits += f"{' ' * (a_indent + 12)}universalApk true\n"
                  splits += f"{' ' * (a_indent + 8)}}}\n"
                  splits += f"{' ' * (a_indent + 4)}}}\n"
                  out.append(splits)
                  depth = 1
                  while i < len(lines) and depth > 0:
                      depth += lines[i].count('{') - lines[i].count('}')
                      out.append(lines[i])
                      i += 1

              else:
                  out.append(line)
                  i += 1

          path.write_text("".join(out), encoding="utf-8")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: curium-apk-splits-${{ github.ref_name }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release and upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft=false \
            --prerelease=false \
            android/app/build/outputs/apk/**/*.apk
