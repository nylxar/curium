name: Android APK Splits

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Expo prebuild
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Inject signing, splits, and split version codes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          gradle = Path("android/app/build.gradle")
          if not gradle.exists():
              raise SystemExit("android/app/build.gradle was not generated by expo prebuild")

          text = gradle.read_text(encoding="utf-8")

          if "release.keystore" not in text:
              signing_block = """\
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              """
              text = re.sub(r'android\s*\{\s*\n', "android {\n" + signing_block, text, count=1)

          if "splits {" not in text:
              splits_block = """\
              splits {
                  density {
                      enable true
                      reset()
                      include "mdpi", "hdpi", "xhdpi", "xxhdpi", "xxxhdpi"
                  }
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                      universalApk true
                  }
              }
              """
              text = re.sub(r'android\s*\{\s*\n', "android {\n" + splits_block, text, count=1)

          if "signingConfig signingConfigs.release" not in text:
              text = re.sub(
                  r'(^\s*release\s*\{\s*$)',
                  r'\1\n            signingConfig signingConfigs.release',
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )

          if "OutputFile.ABI" not in text:
              version_block = """\

          import com.android.build.OutputFile

          ext.abiCodes = ['armeabi-v7a': 1, 'arm64-v8a': 2, 'x86': 3, 'x86_64': 4]
          ext.densityCodes = ['mdpi': 1, 'hdpi': 2, 'xhdpi': 3, 'xxhdpi': 4, 'xxxhdpi': 5]

          android.applicationVariants.all { variant ->
              variant.outputs.each { output ->
                  def abi = output.getFilter(OutputFile.ABI)
                  def density = output.getFilter(OutputFile.DENSITY)
                  def abiCode = project.ext.abiCodes.get(abi)
                  def densityCode = project.ext.densityCodes.get(density)

                  if (abiCode != null || densityCode != null) {
                      output.versionCodeOverride =
                          (variant.versionCode * 1000) + ((abiCode ?: 0) * 10) + (densityCode ?: 0)
                  }
              }
          }
          """
              text = text.rstrip() + version_block + "\n"

          gradle.write_text(text, encoding="utf-8")
          PY

      - uses: gradle/actions/setup-gradle@v6

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --build-cache --parallel --stacktrace

      - name: Create GitHub Release and upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          release_file="$(mktemp)"
          code="$(curl -sS -o "$release_file" -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${GH_TAG}" || true)"

          if [ "$code" = "404" ]; then
            body="$(python3 - <<'PY'
            import json, os
            print(json.dumps({
                "tag_name": os.environ["GH_TAG"],
                "target_commitish": os.environ["GITHUB_SHA"],
                "generate_release_notes": True,
                "draft": False,
                "prerelease": False,
            }))
            PY
            )"
            curl -sS -o "$release_file" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/json" \
              -d "$body" \
              "https://api.github.com/repos/${GH_REPO}/releases"
          elif [ "$code" != "200" ]; then
            cat "$release_file"
            exit 1
          fi

          upload_url="$(python3 - <<'PY' "$release_file"
          import json, sys
          print(json.load(open(sys.argv[1]))["upload_url"].split("{", 1)[0])
          PY
          )"

          shopt -s globstar nullglob
          files=(android/app/build/outputs/apk/**/*.apk)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No APKs found"
            exit 1
          fi

          for file in "${files[@]}"; do
            name="$(basename "$file")"
            encoded_name="$(python3 - <<'PY' "$name"
            import sys, urllib.parse
            print(urllib.parse.quote(sys.argv[1]))
            PY
            )"
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"${file}" \
              "${upload_url}?name=${encoded_name}"
          done
